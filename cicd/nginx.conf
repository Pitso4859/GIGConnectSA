server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── API Proxy ──────────────────────────────────────────────────────────────
    # Forward all /api/ requests to the backend.
    # Browser makes a same-origin request to gigconnectsa.onrender.com/api/v1/*
    # nginx forwards it to gigconnect-api.onrender.com/api/v1/*
    # No cross-origin request ever reaches the browser → CORS is irrelevant.
    # proxy_ssl_server_name on  → enables SNI so TLS handshake uses hostname, not IP.
    location /api/ {
        proxy_pass          https://gigconnect-api.onrender.com/api/;
        proxy_http_version  1.1;

        # SNI — critical for Render's shared TLS certificate
        proxy_ssl_server_name on;
        proxy_ssl_name        gigconnect-api.onrender.com;

        proxy_set_header Host              gigconnect-api.onrender.com;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Render free tier can take up to 50s to wake — give it time
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;

        # Strip CORS headers from backend response — nginx is same-origin, not needed
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
    }

    # ── SPA Fallback ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health ─────────────────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 'healthy\n';
        add_header Content-Type text/plain;
    }

    # ── Static Asset Cache ─────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}