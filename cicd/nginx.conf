server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── API Proxy ──────────────────────────────────────────────────────────────
    # Browser calls /api/v1/... (same origin, no CORS)
    # nginx forwards the FULL path unchanged to the backend.
    #
    # proxy_pass has NO trailing path → nginx appends the FULL request URI.
    # So /api/v1/auth/register → https://gigconnect-api.onrender.com/api/v1/auth/register
    # Backend context-path is /api/v1, so Spring sees /auth/register → ✓
    #
    # proxy_ssl_server_name on → SNI so TLS handshake uses the hostname, not IP.
    location /api/ {
        proxy_pass            https://gigconnect-api.onrender.com;
        proxy_http_version    1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name        gigconnect-api.onrender.com;
        proxy_set_header      Host              gigconnect-api.onrender.com;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        # Render free tier can take up to 50 s to wake up — give it time.
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;
    }

    # ── SPA Fallback ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health ─────────────────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 'healthy\n';
        add_header Content-Type text/plain;
    }

    # ── Static Asset Cache ─────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
