name: GIGConnect CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_HUB_REPO: ${{ secrets.DOCKER_HUB_USERNAME }}/gigconnect
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  # ─── 1. Backend: Test & Build ──────────────────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run Tests
        run: ./mvnw test -q

      - name: Build JAR
        run: ./mvnw package -DskipTests -q

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 1

  # ─── 2. Frontend: Test & Build ─────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api/v1

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ─── 3. Docker Build & Push ────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: cicd/Dockerfile.backend
          push: true
          tags: |
            ${{ env.DOCKER_HUB_REPO }}-api:latest
            ${{ env.DOCKER_HUB_REPO }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: cicd/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.DOCKER_HUB_REPO }}-web:latest
            ${{ env.DOCKER_HUB_REPO }}-web:${{ github.sha }}
          build-args: VITE_API_URL=/api/v1
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─── 4. Deploy to Render ───────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://gigconnect-sa.onrender.com
    steps:
      - name: Trigger Render deploy — Backend
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"
        env:
          RENDER_DEPLOY_HOOK_BACKEND: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}

      - name: Trigger Render deploy — Frontend
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"
        env:
          RENDER_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}

      - name: Health check (backend)
        run: |
          echo "Waiting 90s for service restart…"
          sleep 90
          curl --retry 5 --retry-delay 15 --fail \
            https://gigconnect-api.onrender.com/api/v1/actuator/health

      - name: Notify on success
        if: success()
        run: echo "✅ Deployed successfully — ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment failed — check Render dashboard"
