# Render.com Blueprint — gigconnect-sa
# Docs: https://render.com/docs/blueprint-spec

services:
  # ─── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: gigconnect-api
    runtime: docker
    dockerfilePath: ./cicd/Dockerfile.backend
    dockerContext: .
    region: oregon
    plan: free
    healthCheckPath: /api/v1/actuator/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gigconnect-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: gigconnect-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: gigconnect-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false   # set manually in Render dashboard
      - key: CORS_ORIGINS
        value: https://gigconnect-web.onrender.com
      - key: PORT
        value: "8080"

  # ─── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: gigconnect-web
    runtime: docker
    dockerfilePath: ./cicd/Dockerfile.frontend
    dockerContext: .
    region: oregon
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://gigconnect-api.onrender.com/api/v1

# ─── PostgreSQL Database ──────────────────────────────────────────────────────
databases:
  - name: gigconnect-db
    databaseName: gigconnect
    user: gigconnect
    region: oregon
    plan: free
