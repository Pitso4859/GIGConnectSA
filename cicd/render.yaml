  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── API Proxy ──────────────────────────────────────────────────────────────
    # Browser calls /api/v1/... (same origin)
    # nginx forwards the FULL path to the backend unchanged.
    # proxy_ssl_server_name enables SNI for Render's shared TLS cert.
    location /api/ {
    proxy_pass            https://gigconnect-api.onrender.com;
    proxy_http_version    1.1;
    proxy_ssl_server_name on;
    proxy_ssl_name        gigconnect-api.onrender.com;
    proxy_set_header      Host              gigconnect-api.onrender.com;
    proxy_set_header      X-Real-IP         $remote_addr;
    proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header      X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_read_timeout    120s;
    proxy_send_timeout    60s;
    }

    # ── SPA Fallback ───────────────────────────────────────────────────────────
    location / {
    try_files $uri $uri/ /index.html;
    }

    # ── Health ─────────────────────────────────────────────────────────────────
    location /health {
    access_log off;
    return 200 'healthy\n';
    add_header Content-Type text/plain;
    }

    # ── Static Asset Cache ─────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    }
  }