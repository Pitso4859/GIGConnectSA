# Render.com Blueprint — gigconnect-sa
# Docs: https://render.com/docs/blueprint-spec

services:
  # ─── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: gigconnect-api
    runtime: docker
    dockerfilePath: ./cicd/Dockerfile.backend
    dockerContext: .
    region: oregon
    plan: free
    healthCheckPath: /api/v1/actuator/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gigconnect-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TOKEN_EXPIRATION
        value: "900000"
      - key: JWT_REFRESH_TOKEN_EXPIRATION
        value: "604800000"
      - key: GEMINI_API_KEY
        sync: false
      # Must match the actual frontend URL shown in the browser.
      # gigconnectsa.onrender.com is the live URL; gigconnect-web.onrender.com
      # is included as fallback in case the service was redeployed under that name.
      - key: CORS_ORIGINS
        value: https://gigconnectsa.onrender.com,https://gigconnect-web.onrender.com
      - key: SERVER_PORT
        value: "8080"

  # ─── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: gigconnect-web
    runtime: docker
    dockerfilePath: ./cicd/Dockerfile.frontend
    dockerContext: .
    region: oregon
    plan: free
    # VITE_API_URL must be a Docker build arg — Vite bakes it into the JS
    # bundle at build time, not at runtime.
    dockerBuildArgs:
      - key: VITE_API_URL
        value: https://gigconnect-api.onrender.com/api/v1

# ─── PostgreSQL Database ──────────────────────────────────────────────────────
databases:
  - name: gigconnect-db
    databaseName: gigconnect
    user: gigconnect
    region: oregon
    plan: free