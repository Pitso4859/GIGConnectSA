# Render Blueprint — deploys backend + frontend as two Web Services.
# Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this repo to GitHub
#   2. Render Dashboard → New → Blueprint → connect your repo
#   3. Render reads this file automatically
#   4. Set GEMINI_API_KEY and JWT_SECRET in the backend service's Environment tab
#   5. Deploy!

services:
  # ── Backend (Spring Boot API) ───────────────────────────────────────────────
  - type: web
    name: gigconnect-api
    runtime: docker
    dockerfilePath: cicd/Dockerfile.backend
    # Render free tier: 512 MB RAM, shared CPU
    plan: free
    healthCheckPath: /api/v1/actuator/health
    envVars:
      # Render PostgreSQL — link to the database below; Render injects DATABASE_URL automatically.
      - key: DATABASE_URL
        fromDatabase:
          name: gigconnect-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random value
      - key: GEMINI_API_KEY
        sync: false           # Set this manually in the Render dashboard
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: JWT_ACCESS_TOKEN_EXPIRATION
        value: "900000"       # 15 minutes
      - key: JWT_REFRESH_TOKEN_EXPIRATION
        value: "604800000"    # 7 days

  # ── Frontend (React SPA served by Nginx) ───────────────────────────────────
  - type: web
    name: gigconnect-web
    runtime: docker
    dockerfilePath: cicd/Dockerfile.frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        value: /api/v1        # Relative — nginx proxies /api/ to backend service

# ── PostgreSQL Database ────────────────────────────────────────────────────────
databases:
  - name: gigconnect-db
    plan: free
    databaseName: gigconnect
    user: gigconnect
