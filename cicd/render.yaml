# Render.com Blueprint — GIGConnect SA

services:
  # ─── Backend API (Spring Boot) ───────────────────────────────────────────────
  - type: web
    name: gigconnect-api
    runtime: docker
    dockerfilePath: ./cicd/Dockerfile.backend
    dockerContext: .
    region: oregon
    plan: free
    healthCheckPath: /api/v1/actuator/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gigconnect-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: gigconnect-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: gigconnect-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TOKEN_EXPIRATION
        value: "900000"
      - key: JWT_REFRESH_TOKEN_EXPIRATION
        value: "604800000"
      - key: GEMINI_API_KEY
        sync: false

  # ─── Frontend (React + Nginx) ────────────────────────────────────────────────
  - type: web
    name: gigconnect-web
    runtime: docker
    dockerfilePath: ./cicd/Dockerfile.frontend
    dockerContext: .
    region: oregon
    plan: free
    # NO env vars for frontend — VITE_API_URL is baked in as /api/v1 at build time
    # nginx proxies /api/* to gigconnect-api-c3f6.onrender.com

# ─── PostgreSQL Database ──────────────────────────────────────────────────────
databases:
  - name: gigconnect-db
    databaseName: gigconnect_db
    user: gigconnect_db_user
    region: oregon
    plan: free
