services:
  - type: web
    name: gigconnect-api
    runtime: docker
    dockerfilePath: ./cicd/Dockerfile.backend
    dockerContext: .
    region: oregon
    plan: free
    healthCheckPath: /api/v1/actuator/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gigconnect-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TOKEN_EXPIRATION
        value: "900000"
      - key: JWT_REFRESH_TOKEN_EXPIRATION
        value: "604800000"
      - key: GEMINI_API_KEY
        sync: false
      # PORT is injected automatically by Render — do NOT set it here.
      # application.yml reads ${PORT:8080} so the app binds to whatever
      # port Render assigns. Setting PORT or SERVER_PORT here will break it.

  - type: web
    name: gigconnect-web
    runtime: docker
    dockerfilePath: ./cicd/Dockerfile.frontend
    dockerContext: .
    region: oregon
    plan: free
    dockerBuildArgs:
      - key: VITE_API_URL
        value: https://gigconnect-api.onrender.com/api/v1

databases:
  - name: gigconnect-db
    databaseName: gigconnect
    user: gigconnect
    region: oregon
    plan: free