# Render.com Blueprint — gigconnect-sa
# Docs: https://render.com/docs/blueprint-spec

services:
  # ─── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: gigconnect-api
    runtime: docker
    dockerfilePath: ./cicd/Dockerfile.backend
    dockerContext: .
    region: oregon
    plan: free
    healthCheckPath: /api/v1/actuator/health
    envVars:
      # Render's connectionString uses postgresql:// (not jdbc:postgresql://).
      # JDBC requires the jdbc: prefix — so we build JDBC_DATABASE_URL here
      # by prepending it. application.yml reads JDBC_DATABASE_URL, not DATABASE_URL.
      - key: JDBC_DATABASE_URL
        value: "jdbc:"
        # NOTE: Render does not support string concatenation in render.yaml.
        # After deploying, go to the Render dashboard → gigconnect-api → Environment
        # and set JDBC_DATABASE_URL manually to:
        #   jdbc:<value of the Internal Database URL shown on gigconnect-db>
        # Example: jdbc:postgresql://dpg-xxx-a/gigconnect_db?user=gigconnect_db_user&password=xxx
        # OR use the simpler approach below — set it from the database connectionString
        # and add the jdbc: prefix in the dashboard.
      - key: DATABASE_USERNAME
        fromDatabase:
          name: gigconnect-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: gigconnect-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false   # set manually in Render dashboard
      - key: CORS_ORIGINS
        value: https://gigconnect-web.onrender.com
      # Do NOT set PORT — Render reserves it and injects a non-numeric string
      # for Docker services, causing NumberFormatException at startup.
      - key: SERVER_PORT
        value: "8080"

  # ─── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: gigconnect-web
    runtime: docker
    dockerfilePath: ./cicd/Dockerfile.frontend
    dockerContext: .
    region: oregon
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://gigconnect-api.onrender.com/api/v1

# ─── PostgreSQL Database ──────────────────────────────────────────────────────
databases:
  - name: gigconnect-db
    databaseName: gigconnect
    user: gigconnect
    region: oregon
    plan: free
