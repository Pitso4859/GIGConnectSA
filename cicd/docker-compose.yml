version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gigconnect-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gigconnect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: cicd/Dockerfile.backend
    container_name: gigconnect-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/gigconnect
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-must-be-32-chars-minimum}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your-key-here}
      CORS_ORIGINS: http://localhost:3000,http://frontend
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: cicd/Dockerfile.frontend
      args:
        VITE_API_URL: /api/v1
    container_name: gigconnect-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
