# ─── Server ───────────────────────────────────────────────────────────────────
server:
  # Render injects PORT for ALL web service types including Docker.
  # The app MUST bind to PORT or Render's port scan will time out.
  # Falls back to 8080 for local development.
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

# ─── Spring ───────────────────────────────────────────────────────────────────
spring:
  application:
    name: gigconnect-api

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    time-zone: Africa/Johannesburg

# ─── Management / Actuator ────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

# ─── App-specific properties (bound via AppProperties.java) ───────────────────
app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-256-bits-or-longer-for-hmac}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
    refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

  cors:
    # Spring Boot cannot bind a comma-separated env var string to List<String>.
    # SecurityConfig falls back to allowedOriginPatterns("*") when this list is
    # empty, which correctly allows all origins. Set as a YAML list here for
    # local dev; override in production via SecurityConfig wildcard fallback.
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
      - https://gigconnectsa.onrender.com
      - https://gigconnect-web.onrender.com

  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-1.5-flash}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.gigconnect: DEBUG
    org.springframework.security: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ─── SpringDoc / Swagger UI ───────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
  show-actuator: false
  packages-to-scan: com.gigconnect.controller