spring:
  application:
    name: gigconnect-api
  datasource:
    url: jdbc:postgresql://dpg-d8kk51beo5us73eik0og-a:5432/gigconnect_db?ssl=true&sslmode=require
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    user: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}

server:
  # Don't use PORT - Render sets it automatically
  # Just use a fixed port for Docker
  port: 8080
  servlet:
    context-path: /api/v1

app:
  jwt:
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,https://gigconnect-web.onrender.com}
  gemini:
    api-key: ${GEMINI_API_KEY}
    model: gemini-1.5-flash
    base-url: https://generativelanguage.googleapis.com/v1beta/models

logging:
  level:
    com.gigconnect: DEBUG
    org.springframework.security: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
