server:
  # CRITICAL: Do NOT use ${PORT} here. Render injects PORT as a non-numeric
  # string for web services which breaks Spring Boot startup.
  # Render routes external traffic to port 8080 automatically.
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: gigconnect-api
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    time-zone: Africa/Johannesburg

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-256-bits-or-longer-for-hmac}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
    refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
  cors:
    # CORS is handled by allowedOriginPatterns("*") in SecurityConfig.
    # This list is reference only.
    allowed-origins:
      - http://localhost:5173
      - https://gigconnectsa.onrender.com
      - https://gigconnect-web.onrender.com
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-1.5-flash}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}

logging:
  level:
    root: INFO
    com.gigconnect: DEBUG
    org.springframework.security: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs
  packages-to-scan: com.gigconnect.controller
