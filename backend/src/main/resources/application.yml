spring:
  application:
    name: gigconnect-api
  datasource:
    # Spring Boot can handle postgresql:// format
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gigconnect}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    # Flyway REQUIRES jdbc: prefix - convert postgresql:// to jdbc:postgresql://
    url: ${FLYWAY_URL:jdbc:${DATABASE_URL}}
    user: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1

app:
  jwt:
    secret: ${JWT_SECRET:gigconnect-super-secret-key-must-be-256-bits-long-for-hs256-algorithm}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,https://gigconnect-sa.onrender.com}
  gemini:
    api-key: ${GEMINI_API_KEY:your-gemini-api-key}
    model: gemini-1.5-flash
    base-url: https://generativelanguage.googleapis.com/v1beta/models

logging:
  level:
    com.gigconnect: DEBUG
    org.springframework.security: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
